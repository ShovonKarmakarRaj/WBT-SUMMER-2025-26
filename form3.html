<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
</head>

<body>

<div>

    <h1>Create your account</h1>
    <p>Join us in a couple of steps.</p>

    <form>

        <div>
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="Jane Doe">
        </div>

        <br>

        <div>
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="28">
        </div>

        <br>

        <div>
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob">
        </div>

        <br>

        <div>
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="jane@example.com">
        </div>

        <br>

        <div>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password">
        </div>

        <br>

        <div>
            <p><b>Preferred Contact</b></p>

            <input type="radio" name="contact" id="contact-email">
            <label for="contact-email">Email</label>

            <input type="radio" name="contact" id="contact-phone">
            <label for="contact-phone">Phone</label>

            <input type="radio" name="contact" id="contact-sms">
            <label for="contact-sms">SMS</label>
        </div>

        <br><br>

        <div>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>

    </form>

</div>

</body>
</html>
