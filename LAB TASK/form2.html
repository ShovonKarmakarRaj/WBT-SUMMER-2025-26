<!DOCTYPE html>
<html>

<head>
    <title>Registration Form</title>
</head>

<body>

    <div>

        <h1>Registration</h1>

        <p>Please fill out the Registration Form completely.</p>

        <form>

            <div>
                <h3>Full Name</h3>
                <input type="text" placeholder="Jane Doe">
            </div>

            <div>
                <h3>Postal Code</h3>
                <input type="number" placeholder="10001">
            </div>

            <div>
                <h3>Date of Birth</h3>
                <input type="date">
            </div>

            <div>
                <h3>Email Address</h3>
                <input type="email" placeholder="jane@example.com">
            </div>

            <div>
                <h3>Password</h3>
                <input type="password" placeholder="Password">
            </div>

            <div>
                <h3>Country</h3>

                <select>
                    <option>Select a country for the Registration Form...</option>
                    <option>Bangladesh</option>
                    <option>India</option>
                    <option>USA</option>
                </select>
            </div>

            <div>
                <button>Submit the Registration Form</button>
                <button type="reset">Reset the Registration Form</button>
            </div>

        </form>

    </div>

</body>

</html>
